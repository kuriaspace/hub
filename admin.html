<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuriaSpace Admin Panel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --navy: #1B2A4A;
    --navy-deep: #0f1a2e;
    --gold: #C9A227;
    --gold-light: #e8c45a;
    --cream: #F8F6F0;
    --grey: #6b7280;
    --success: #10b981;
    --danger: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--navy-deep);
    color: var(--navy);
    min-height: 100vh;
  }

  .container {
    display: grid;
    grid-template-columns: 250px 1fr;
    min-height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--navy);
    border-right: 1px solid rgba(201,162,39,0.1);
    padding: 30px 0;
    position: sticky;
    top: 0;
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 20px;
    margin-bottom: 40px;
    text-decoration: none;
  }

  .sidebar-logo svg {
    width: 32px;
    height: 32px;
  }

  .sidebar-brand {
    color: #fff;
  }

  .sidebar-brand .name {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 600;
    display: block;
  }

  .sidebar-brand .tag {
    font-size: 0.55rem;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    display: block;
  }

  .sidebar-menu {
    list-style: none;
  }

  .sidebar-menu li a {
    display: block;
    padding: 12px 20px;
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    font-size: 0.9rem;
    transition: all 0.2s;
    border-left: 3px solid transparent;
  }

  .sidebar-menu li a:hover,
  .sidebar-menu li a.active {
    background: rgba(201,162,39,0.1);
    color: var(--gold);
    border-left-color: var(--gold);
  }

  .sidebar-footer {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px;
    border-top: 1px solid rgba(201,162,39,0.1);
  }

  .logout-btn {
    display: block;
    width: 100%;
    padding: 10px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #ef4444;
    border-radius: 4px;
    text-align: center;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .logout-btn:hover {
    background: rgba(239,68,68,0.2);
    border-color: #ef4444;
  }

  /* ── MAIN CONTENT ── */
  .content {
    background: #f9fafb;
    overflow-y: auto;
  }

  .header {
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    padding: 24px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--navy);
  }

  .header-right {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .user-info {
    text-align: right;
    font-size: 0.85rem;
  }

  .user-info .name {
    display: block;
    font-weight: 600;
    color: var(--navy);
  }

  .user-info .role {
    display: block;
    font-size: 0.75rem;
    color: var(--grey);
  }

  .main {
    padding: 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── FORMS ── */
  .form-section {
    background: #fff;
    border-radius: 8px;
    padding: 32px;
    margin-bottom: 32px;
    border: 1px solid #e5e7eb;
  }

  .form-section h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    margin-bottom: 24px;
    color: var(--navy);
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--navy);
    font-size: 0.9rem;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,162,39,0.1);
  }

  .form-group textarea {
    resize: vertical;
    min-height: 100px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .image-upload-wrapper {
    position: relative;
  }

  .image-upload-wrapper input[type="file"] {
    padding: 12px;
    border: 2px dashed #d1d5db;
    background: #f9fafb;
    cursor: pointer;
    transition: all 0.2s;
  }

  .image-upload-wrapper input[type="file"]:hover {
    border-color: var(--gold);
    background: #f0f9ff;
  }

  #imagePreview {
    display: none;
    position: relative;
    width: 100%;
    max-width: 300px;
    margin-top: 16px;
  }

  #imagePreview img {
    width: 100%;
    height: auto;
    border-radius: 6px;
    border: 1px solid #e5e7eb;
    margin-bottom: 12px;
  }

  #imagePreview.has-image {
    display: block;
  }

  .preview-remove {
    display: inline-block;
    padding: 6px 12px;
    background: var(--danger);
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .preview-remove:hover {
    background: #dc2626;
  }

  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--gold);
    color: var(--navy);
  }

  .btn-primary:hover {
    background: var(--gold-light);
  }

  .btn-danger {
    background: var(--danger);
    color: #fff;
    padding: 6px 12px;
    font-size: 0.8rem;
  }

  .btn-danger:hover {
    background: #dc2626;
  }

  /* ── EVENTS LIST ── */
  .events-list {
    display: grid;
    gap: 16px;
  }

  .event-item {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 20px;
    align-items: center;
  }

  .event-item:hover {
    border-color: var(--gold);
    box-shadow: 0 4px 12px rgba(201,162,39,0.1);
  }

  .event-info {
    flex: 1;
  }

  .event-item-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 4px;
  }

  .event-item-date {
    font-size: 0.85rem;
    color: var(--grey);
    margin-bottom: 8px;
  }

  .event-item-desc {
    font-size: 0.85rem;
    color: #666;
    line-height: 1.5;
  }

  .no-events {
    text-align: center;
    padding: 40px 20px;
    color: var(--grey);
  }

  /* ── ALERTS ── */
  .alert {
    padding: 12px 16px;
    border-radius: 4px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .alert-success {
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3);
    color: #059669;
  }

  .alert-danger {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #dc2626;
  }

  .alert-close {
    background: none;
    border: none;
    color: inherit;
    cursor: pointer;
    font-size: 1.2rem;
    padding: 0;
  }

  /* ── LOGIN ── */
  .login-container {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .login-box {
    background: #fff;
    padding: 40px;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(27,42,74,0.1);
    width: 100%;
    max-width: 400px;
  }

  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .login-logo svg {
    width: 60px;
    height: 60px;
    margin-bottom: 16px;
  }

  .login-logo h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--navy);
    margin-bottom: 4px;
  }

  .login-logo p {
    font-size: 0.85rem;
    color: var(--grey);
  }

  .login-form .form-group {
    margin-bottom: 20px;
  }

  .login-form .btn-primary {
    width: 100%;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .container {
      grid-template-columns: 1fr;
    }

    .sidebar {
      position: fixed;
      left: -250px;
      top: 0;
      height: 100%;
      z-index: 1000;
      transition: left 0.2s;
    }

    .form-row {
      grid-template-columns: 1fr;
    }

    .header {
      padding: 16px 20px;
    }

    .main {
      padding: 20px;
    }

    .form-section {
      padding: 20px;
    }

    .event-item {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<div id="loginView" class="login-container">
  <div class="login-box">
    <div class="login-logo">
      <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <circle cx="40" cy="40" r="36" fill="none" stroke="#C9A227" stroke-width="1"/>
        <line x1="40" y1="40" x2="40" y2="18" stroke="#1B2A4A" stroke-width="2"/>
        <line x1="40" y1="40" x2="22" y2="56" stroke="#1B2A4A" stroke-width="2"/>
        <line x1="40" y1="40" x2="58" y2="56" stroke="#1B2A4A" stroke-width="2"/>
        <line x1="40" y1="18" x2="22" y2="56" stroke="#C9A227" stroke-width="1"/>
        <line x1="22" y1="56" x2="58" y2="56" stroke="#C9A227" stroke-width="1"/>
        <line x1="58" y1="56" x2="40" y2="18" stroke="#C9A227" stroke-width="1"/>
        <circle cx="40" cy="40" r="5" fill="#1B2A4A"/>
        <circle cx="40" cy="18" r="4" fill="#C9A227"/>
        <circle cx="22" cy="56" r="4" fill="#C9A227"/>
        <circle cx="58" cy="56" r="4" fill="#C9A227"/>
      </svg>
      <h1>KuriaSpace</h1>
      <p>Admin Panel</p>
    </div>
    <form class="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary">Access Admin Panel</button>
    </form>
  </div>
</div>

<div id="adminView" class="container" style="display: none;">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <a href="index.html" class="sidebar-logo">
      <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <circle cx="40" cy="40" r="36" fill="none" stroke="#C9A227" stroke-width="1"/>
        <line x1="40" y1="40" x2="40" y2="18" stroke="#fff" stroke-width="2"/>
        <line x1="40" y1="40" x2="22" y2="56" stroke="#fff" stroke-width="2"/>
        <line x1="40" y1="40" x2="58" y2="56" stroke="#fff" stroke-width="2"/>
        <line x1="40" y1="18" x2="22" y2="56" stroke="#C9A227" stroke-width="1"/>
        <line x1="22" y1="56" x2="58" y2="56" stroke="#C9A227" stroke-width="1"/>
        <line x1="58" y1="56" x2="40" y2="18" stroke="#C9A227" stroke-width="1"/>
        <circle cx="40" cy="40" r="5" fill="#fff"/>
        <circle cx="40" cy="18" r="4" fill="#C9A227"/>
        <circle cx="22" cy="56" r="4" fill="#C9A227"/>
        <circle cx="58" cy="56" r="4" fill="#C9A227"/>
      </svg>
      <div class="sidebar-brand">
        <span class="name">KuriaSpace</span>
        <span class="tag">Admin</span>
      </div>
    </a>
    <ul class="sidebar-menu">
      <li><a href="#" class="menu-item active" data-tab="events">Events Management</a></li>
    </ul>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content">
    <div class="header">
      <h1>Dashboard</h1>
      <div class="header-right">
        <div class="user-info">
          <span class="name">Admin</span>
          <span class="role">KuriaSpace Manager</span>
        </div>
      </div>
    </div>

    <div class="main">
      <!-- ALERTS -->
      <div id="alertContainer"></div>

      <!-- EVENTS TAB -->
      <div id="events" class="tab-content active">
        <div class="form-section">
          <h2>Add New Event</h2>
          <form onsubmit="handleAddEvent(event)">
            <div class="form-row">
              <div class="form-group">
                <label>Event Title</label>
                <input type="text" id="eventTitle" required>
              </div>
              <div class="form-group">
                <label>Event Date</label>
                <input type="date" id="eventDate" required>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Event Time</label>
                <input type="time" id="eventTime" required>
              </div>
              <div class="form-group">
                <label>Event Link (optional)</label>
                <input type="url" id="eventLink">
              </div>
            </div>
            <div class="form-group">
              <label>Event Description</label>
              <textarea id="eventDesc" required></textarea>
            </div>
            <div class="form-group">
              <label>Event Image (optional)</label>
              <div class="image-upload-wrapper">
                <input type="file" id="eventImage" accept="image/*">
                <small style="color: var(--grey); display: block; margin-top: 8px;">Recommended: JPG or PNG, max 2MB</small>
                <div id="imagePreview" style="margin-top: 16px;"></div>
              </div>
            </div>
            <button type="submit" class="btn btn-primary">Add Event</button>
          </form>
        </div>

        <div class="form-section">
          <h2>Manage Events</h2>
          <div class="events-list" id="eventsList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase SDK (Compat) -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<!-- Load configuration from config.js (password protected) -->
<script src="config.js"></script>

<script>
// Password and Firebase config loaded from config.js

// Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyDU6G0VOa2Og58E5mWSjuHhrRMzYSPQdXk",
  authDomain: "kuriaspace-809f7.firebaseapp.com",
  databaseURL: "https://kuriaspace-809f7-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kuriaspace-809f7",
  storageBucket: "kuriaspace-809f7.firebasestorage.app",
  messagingSenderId: "539503194984",
  appId: "1:539503194984:web:08af1e81b1ae11e7ff5cdd",
  measurementId: "G-1GQ1868N5V"
};

// Initialize Firebase
let database;
console.log('🔄 Initializing Firebase...');
try {
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  database = firebase.database();
  console.log('✅ Firebase initialized successfully');
} catch (error) {
  console.error('❌ Firebase initialization error:', error);
  alert('Firebase error: ' + error.message);
}

// Check if logged in
function checkAuth() {
  const isAuthenticated = sessionStorage.getItem('kuriaAdmin');
  const loginView = document.getElementById('loginView');
  const adminView = document.getElementById('adminView');

  if (isAuthenticated) {
    loginView.style.display = 'none';
    adminView.style.display = 'grid';
    loadEvents();
    setupMenuItems();
  } else {
    loginView.style.display = 'flex';
    adminView.style.display = 'none';
  }
}

function handleLogin(e) {
  e.preventDefault();
  const password = document.getElementById('password').value;

  if (password === ADMIN_PASSWORD) {
    sessionStorage.setItem('kuriaAdmin', 'true');
    checkAuth();
  } else {
    showAlert('Invalid password', 'danger');
    document.getElementById('password').value = '';
  }
}

function handleLogout() {
  sessionStorage.removeItem('kuriaAdmin');
  checkAuth();
}

function handleAddEvent(e) {
  e.preventDefault();
  console.log('🔄 Adding event...');
  
  if (!database) {
    alert('Firebase not connected. Refresh the page.');
    console.error('Database not initialized');
    return;
  }

  const fileInput = document.getElementById('eventImage');
  
  if (fileInput.files.length > 0) {
    console.log('📷 Processing image...');
    const file = fileInput.files[0];
    const reader = new FileReader();
    
    reader.onload = function(event) {
      const imageData = event.target.result;
      console.log('✅ Image loaded');
      saveEvent(imageData);
    };
    
    reader.readAsDataURL(file);
  } else {
    console.log('📝 No image, saving event...');
    saveEvent(null);
  }
}

function saveEvent(imageData) {
  console.log('💾 Saving event...');
  
  const event = {
    title: document.getElementById('eventTitle').value,
    date: document.getElementById('eventDate').value,
    time: document.getElementById('eventTime').value,
    description: document.getElementById('eventDesc').value,
    link: document.getElementById('eventLink').value,
    image: imageData || null,
    createdAt: new Date().toISOString()
  };

  console.log('Event data:', event);

  if (!database) {
    alert('❌ Firebase database not connected');
    console.error('Database is null/undefined');
    return;
  }

  // Save to Firebase
  const eventsRef = database.ref('events');
  const newEventRef = eventsRef.push();
  
  console.log('🚀 Pushing to Firebase...');
  
  newEventRef.set(event)
    .then(() => {
      console.log('✅ Event saved successfully!');
      
      // Clear form
      document.getElementById('eventTitle').value = '';
      document.getElementById('eventDate').value = '';
      document.getElementById('eventTime').value = '';
      document.getElementById('eventDesc').value = '';
      document.getElementById('eventLink').value = '';
      document.getElementById('eventImage').value = '';
      clearImagePreview();
      
      showAlert('Event added successfully!', 'success');
      loadEvents();
    })
    .catch(error => {
      console.error('❌ Error saving event:', error);
      showAlert('Error: ' + error.message, 'danger');
    });
}

function deleteEvent(eventId) {
  if (!confirm('Delete this event?')) return;

  database.ref('events/' + eventId).remove()
    .then(() => {
      showAlert('Event deleted', 'success');
      loadEvents();
    })
    .catch(error => {
      showAlert('Error deleting event: ' + error.message, 'danger');
    });
}

function loadEvents() {
  const list = document.getElementById('eventsList');
  const eventsRef = database.ref('events');
  
  eventsRef.on('value', (snapshot) => {
    const eventsData = snapshot.val();
    
    if (!eventsData) {
      list.innerHTML = '<div class="no-events">No events yet. Add your first event above.</div>';
      return;
    }
    
    let html = '';
    Object.keys(eventsData).forEach(key => {
      const event = eventsData[key];
      html += `
        <div class="event-item">
          ${event.image ? `<img src="${event.image}" style="width: 100px; height: 100px; object-fit: cover; border-radius: 6px; margin-right: 16px;">` : ''}
          <div class="event-info">
            <div class="event-item-title">${event.title}</div>
            <div class="event-item-date">${new Date(event.date).toLocaleDateString()} at ${event.time}</div>
            <div class="event-item-desc">${event.description}</div>
          </div>
          <button class="btn btn-danger" onclick="deleteEvent('${key}')">Delete</button>
        </div>
      `;
    });
    
    list.innerHTML = html;
  });
}

// Image preview functionality
document.addEventListener('DOMContentLoaded', function() {
  const imageInput = document.getElementById('eventImage');
  if (imageInput) {
    imageInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          showImagePreview(event.target.result);
        };
        reader.readAsDataURL(file);
      }
    });
  }
});

function showImagePreview(src) {
  const preview = document.getElementById('imagePreview');
  preview.innerHTML = `
    <img src="${src}" alt="Event preview">
    <button type="button" class="preview-remove" onclick="clearImagePreview()">Remove Image</button>
  `;
  preview.classList.add('has-image');
}

function clearImagePreview() {
  const preview = document.getElementById('imagePreview');
  const input = document.getElementById('eventImage');
  preview.innerHTML = '';
  preview.classList.remove('has-image');
  if (input) input.value = '';
}

function showAlert(message, type) {
  const container = document.getElementById('alertContainer');
  const alert = document.createElement('div');
  alert.className = `alert alert-${type}`;
  alert.innerHTML = `
    <span>${message}</span>
    <button class="alert-close" onclick="this.parentElement.remove()">×</button>
  `;
  container.appendChild(alert);

  setTimeout(() => alert.remove(), 5000);
}

function setupMenuItems() {
  document.querySelectorAll('.menu-item').forEach(item => {
    item.addEventListener('click', (e) => {
      e.preventDefault();
      const tab = item.dataset.tab;
      
      document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
      item.classList.add('active');
    });
  });
}

// Initialize
checkAuth();
</script>
</body>
</html>
